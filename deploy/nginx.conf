# ============================================================
# Nginx config — Promope CRM
# Serves: React SPA (port 80) + proxies /api/ /admin/ /ws/
#         to Daphne ASGI server on 127.0.0.1:8000
# ============================================================

upstream daphne {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name 3.110.120.55;

    # ── Logs ─────────────────────────────────────────────
    access_log /var/log/nginx/promope-crm.access.log;
    error_log  /var/log/nginx/promope-crm.error.log;

    # ── Upload size ───────────────────────────────────────
    client_max_body_size 20M;

    # ── Django static files ───────────────────────────────
    location /static/ {
        alias /home/ubuntu/promope-crm/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ── Django media files (uploads, resumes, etc.) ───────
    location /media/ {
        alias /home/ubuntu/promope-crm/backend/media/;
        expires 7d;
    }

    # ── REST API → Daphne ─────────────────────────────────
    location /api/ {
        proxy_pass         http://daphne;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # ── Django Admin → Daphne ────────────────────────────
    location /admin/ {
        proxy_pass         http://daphne;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket connections → Daphne ───────────────────
    # Handles Django Channels real-time feed, chat, notifications
    location /ws/ {
        proxy_pass          http://daphne;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        # Keep WebSocket connections alive (activity feed, chat)
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── React SPA (Vite build) ────────────────────────────
    # Serve frontend/dist/ directly — React Router handles routing
    root /home/ubuntu/promope-crm/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
